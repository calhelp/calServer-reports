---
name: Publish Downloads

on:
  workflow_run:
    workflows: ["Package Reports"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Workflow run ID for the artifacts to publish"
        required: true
        type: string
      run_number:
        description: "Workflow run number for metadata"
        required: false
        type: string
      commit_sha:
        description: "Commit SHA for metadata"
        required: false
        type: string
      workflow_name:
        description: "Workflow name for metadata"
        required: false
        type: string

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download report ZIP artifacts from build
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id || github.event.inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: report-zips
          path: artifacts/report-zips

      - name: Validate downloaded artifacts
        run: |
          set -euo pipefail

          if [ ! -d artifacts ]; then
            echo "ERROR: artifacts/ directory was not created by actions/download-artifact."
            exit 1
          fi

          if ! find artifacts -mindepth 1 -maxdepth 1 -type d | grep -q .; then
            echo "ERROR: artifacts/ contains no artifact subdirectories; aborting publish."
            exit 1
          fi

      - name: Collect last-modified dates
        run: |
          set -euo pipefail
          : > artifacts/last-modified.tsv

          get_last_modified() {
            local source_dir="$1"
            local zip_name="$2"
            local date
            date="$(git log -1 --format=%cI -- "${source_dir}")"
            if [ -z "$date" ]; then
              date="unknown"
            fi
            printf "%s\t%s\n" "${zip_name}" "${date}" >> artifacts/last-modified.tsv
          }

          get_last_modified "DAKKS-SAMPLE" "dakks-sample"
          get_last_modified "DCC" "dcc-sample"
          get_last_modified "FIELD-NAMES" "field-names"
          get_last_modified "ORDER-SAMPLE" "order-sample"
          get_last_modified "INVENTORY-SAMPLE" "inventory-sample"
          get_last_modified "KALIBRIERKONTROLLBLATT" "kalibrierkontrollblatt"
          get_last_modified "DELIVERY-STANDALONE" "delivery-standalone"
          get_last_modified "STICKERS/CAL-INV-STICKER_Zebra-ZD621_30x15-203dpi" "sticker-cal-inv-zebra-zd621-30x15-203dpi"
          get_last_modified "STICKERS/CAL-STICKER_Zebra-ZD621_30x15-203dpi" "sticker-cal-zebra-zd621-30x15-203dpi"
          get_last_modified "STICKERS/DAKKS-Aufkleber_12mm" "sticker-dakks-aufkleber-12mm"
          get_last_modified "STICKERS/DAKKS-Aufkleber_18mm" "sticker-dakks-aufkleber-18mm"
          get_last_modified "STICKERS/INV-STICKER_Zebra-ZD621_30x15-203dpi" "sticker-inv-zebra-zd621-30x15-203dpi"
          get_last_modified "STICKERS/INV-CAL-LOC-STICKER_Zebra-ZD621_30x15-203dpi" "sticker-inv-cal-loc-zebra-zd621-30x15-203dpi"
          get_last_modified "TRACE-FORWARD" "trace-forward"
          get_last_modified "TRACE-BACKWARD" "trace-backward"
          get_last_modified "STICKERS/Sticker_Vorlage" "sticker-vorlage"
          get_last_modified "DAKKS-JSON-SAMPLE" "dakks-json-sample"
          get_last_modified "INVENTORY-JSON-SAMPLE" "inventory-json-sample"

          echo "Last-modified dates:"
          cat artifacts/last-modified.tsv

      - name: Install Markdown renderer
        run: python -m pip install --upgrade "markdown==3.6" "Pygments==2.17.2"

      - name: Build downloads site
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || github.event.inputs.workflow_name }}
          RUN_ID: ${{ github.event.workflow_run.id || github.event.inputs.run_id }}
          RUN_NUMBER: ${{ github.event.workflow_run.run_number || github.event.inputs.run_number }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.event.inputs.commit_sha }}
        run: |
          set -euo pipefail

          SITE_DIR="site"
          DOWNLOADS_DIR="${SITE_DIR}/downloads"
          FILES_DIR="${DOWNLOADS_DIR}/files"
          METADATA_FILE="${DOWNLOADS_DIR}/metadata.tsv"

          rm -rf "${SITE_DIR}"
          mkdir -p "${FILES_DIR}"

          cp -R downloads/index.html downloads/assets "${DOWNLOADS_DIR}/"
          cp pages/index.html "${SITE_DIR}/index.html"
          touch "${SITE_DIR}/.nojekyll"

          : > "${METADATA_FILE}"
          shopt -s nullglob

          for zip_file in artifacts/report-zips/*.zip; do
            if [ -f "${zip_file}" ]; then
              filename="$(basename "${zip_file}")"
              artifact_name="${filename%.zip}"
              target_path="${GITHUB_WORKSPACE}/${FILES_DIR}/${filename}"
              cp "${zip_file}" "${target_path}"
              size_bytes="$(stat -c%s "${target_path}")"
              sha256="$(sha256sum "${target_path}" | awk '{print $1}')"
              printf "%s\t%s\t%s\t%s\n" "${artifact_name}" "${filename}" "${size_bytes}" "${sha256}" >> "${METADATA_FILE}"
            fi
          done

          if [ ! -s "${METADATA_FILE}" ]; then
            echo "ERROR: ${METADATA_FILE} is empty; no download metadata was generated."
            exit 1
          fi

          python - <<'PY'
          import html
          import json
          import re
          from datetime import datetime, timezone
          from pathlib import Path
          import os

          import markdown as md

          README_MAP = {
              "dakks-sample":       "DAKKS-SAMPLE/README.md",
              "dcc-sample":         "DCC/main_reports/README.md",
              "field-names":        "FIELD-NAMES/main_reports/README.md",
              "order-sample":       "ORDER-SAMPLE/main_reports/README.md",
              "inventory-sample":   "INVENTORY-SAMPLE/main_reports/README.md",
              "kalibrierkontrollblatt": "KALIBRIERKONTROLLBLATT/main_reports/README.md",
              "delivery-standalone":"DELIVERY-STANDALONE/README.md",
              "trace-forward":     "TRACE-FORWARD/main_reports/README.md",
              "trace-backward":    "TRACE-BACKWARD/main_reports/README.md",
              "dakks-json-sample":     "DAKKS-JSON-SAMPLE/README.md",
              "inventory-json-sample": "INVENTORY-JSON-SAMPLE/README.md",
          }

          SCHEMA_MAP = {
              "dakks-sample": "DAKKS-SAMPLE/schema.json",
          }

          TITLE_MAP = {
              "dakks-sample":           "DAkkS-Kalibrierschein",
              "dcc-sample":             "DCC – Digitaler Kalibrierschein",
              "field-names":            "Feldnamen-Übersicht",
              "order-sample":           "Auftragsbericht",
              "inventory-sample":       "Inventar-/Messmittelbericht",
              "kalibrierkontrollblatt": "Kalibrierkontrollblatt",
              "delivery-standalone":    "Lieferschein (Standalone)",
              "trace-forward":          "Trace-Forward (Wirkungsanalyse)",
              "trace-backward":         "Trace-Backward (Rückführungskette)",
              "dakks-json-sample":      "DAkkS-Kalibrierschein (APEX · V2)",
              "inventory-json-sample":  "Geräte-Datenblatt (APEX · V2)",
          }

          INFO_TEMPLATE = """<!doctype html>
          <html lang="de">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>{title} – Info</title>
              <link rel="stylesheet" href="../assets/style.css" />
            </head>
            <body>
              <main class="page">
                <header class="page__header">
                  <div>
                    <p class="page__eyebrow"><a href="../">&larr; Zurück zu den Downloads</a></p>
                    <h1>{title}</h1>
                    <p class="page__subhead">Artefakt: <code>{artifact}</code></p>
                  </div>
                </header>
                {schema}
                <section class="card report-info">
                  {body}
                </section>
              </main>
            </body>
          </html>
          """

          def render_schema(artifact_name, schema_path):
              if not schema_path or not Path(schema_path).exists():
                  return ""
              data = json.loads(Path(schema_path).read_text(encoding="utf-8"))
              blocks = data.get("blocks", [])
              if not blocks:
                  return ""

              # Layout constants for the wireframe SVG.
              vw = 600
              pad_outer = 24
              gap = 12

              tone_styles = {
                  "default":  ("#ffffff",      "#cdd6e4"),
                  "accent":   ("#eaf0fb",      "#9bb3e8"),
                  "highlight":("#fff7e6",      "#e6b86a"),
              }

              # Chip-Layout-Konstanten.
              CHIP_HEIGHT = 22
              CHIP_ROW_STEP = 26          # Höhe + 4 px Reihenabstand
              CHIP_GAP_X = 6
              CHIP_TOP_OFFSET = 64        # Abstand Block-Top → erste Chip-Reihe (unter Subtitle)
              CHIP_BOTTOM_PAD = 12        # Reserve unter der letzten Chip-Reihe innerhalb der Box
              MORE_CHIP_WIDTH = 56

              def chip_width_for(label_text):
                  return max(60, round(6.6 * len(label_text)) + 20)

              def layout_chips(visible, remaining_count, chip_left, chip_right):
                  """Bricht Chips in mehrere Reihen um. Liefert (rows, leftover_count).
                  rows: Liste von Reihen, jede Reihe ist Liste von (text, width, is_more)."""
                  rows = [[]]
                  cur_x = chip_left
                  for p in visible:
                      width = min(chip_width_for(p), chip_right - chip_left)
                      if cur_x + width > chip_right and rows[-1]:
                          rows.append([])
                          cur_x = chip_left
                      rows[-1].append((p, width, False))
                      cur_x += width + CHIP_GAP_X
                  if remaining_count > 0:
                      width = MORE_CHIP_WIDTH
                      if cur_x + width > chip_right and rows[-1]:
                          rows.append([])
                          cur_x = chip_left
                      rows[-1].append((f"+{remaining_count}", width, True))
                  if rows and not rows[-1]:
                      rows.pop()
                  return rows

              # Pass 1: effektive Höhen berechnen, damit total_h passt.
              effective_heights = []
              for b in blocks:
                  raw_h = b.get("height", 100)
                  params = b.get("params", []) or []
                  visible = params[:5]
                  remaining = len(params) - len(visible)
                  chip_left = pad_outer + 78
                  chip_right = (vw - pad_outer) - 16
                  rows = layout_chips(visible, remaining, chip_left, chip_right)
                  needed = CHIP_TOP_OFFSET + len(rows) * CHIP_ROW_STEP + CHIP_BOTTOM_PAD if rows else 0
                  effective_heights.append(max(raw_h, needed))

              total_h = pad_outer + sum(effective_heights) + gap * (len(blocks) - 1) + pad_outer
              vh = total_h

              hotspots, legend_items = [], []
              y = pad_outer
              for idx, b in enumerate(blocks):
                  bh = effective_heights[idx]
                  human_idx = idx + 1
                  label = b.get("label", b.get("id", f"Block {human_idx}"))
                  subtitle = b.get("subtitle", "")
                  anchor = b.get("anchor", "")
                  params = b.get("params", []) or []
                  fill, stroke = tone_styles.get(b.get("tone", "default"), tone_styles["default"])
                  esc_label = html.escape(label)
                  esc_subtitle = html.escape(subtitle)
                  esc_anchor = html.escape(anchor, quote=True)
                  x = pad_outer
                  w = vw - 2 * pad_outer
                  cx, cy = x + 36, y + 36

                  # Parameter-Chips: nur die ersten 4–5 anzeigen, Rest mit "+N".
                  visible = params[:5]
                  remaining = len(params) - len(visible)
                  chip_left = x + 78
                  chip_right = (x + w) - 16
                  rows = layout_chips(visible, remaining, chip_left, chip_right)

                  chips_svg = []
                  for row_i, row in enumerate(rows):
                      row_y = y + CHIP_TOP_OFFSET + row_i * CHIP_ROW_STEP
                      cur_x = chip_left
                      for text, width, is_more in row:
                          cls = "schema-chip schema-chip--more" if is_more else "schema-chip"
                          chips_svg.append(
                              f'<g class="{cls}">'
                              f'<rect x="{cur_x}" y="{row_y}" width="{width}" height="{CHIP_HEIGHT}" rx="11" />'
                              f'<text x="{cur_x + width/2:.1f}" y="{row_y + CHIP_HEIGHT - 7}" text-anchor="middle">{html.escape(text)}</text>'
                              f'</g>'
                          )
                          cur_x += width + CHIP_GAP_X

                  hotspots.append(
                      f'<a href="{esc_anchor}" class="report-schema__link">'
                      f'<title>{human_idx}. {esc_label}</title>'
                      f'<rect class="schema-block" x="{x}" y="{y}" width="{w}" height="{bh}" rx="14" '
                      f'fill="{fill}" stroke="{stroke}" />'
                      f'<circle class="marker" cx="{cx}" cy="{cy}" r="22" />'
                      f'<text class="marker-label" x="{cx}" y="{cy}" text-anchor="middle" '
                      f'dominant-baseline="central">{human_idx}</text>'
                      f'<text class="schema-title" x="{x + 78}" y="{y + 32}">{esc_label}</text>'
                      + (f'<text class="schema-subtitle" x="{x + 78}" y="{y + 54}">{esc_subtitle}</text>' if subtitle else '')
                      + f'{"".join(chips_svg)}'
                      f'</a>'
                  )

                  param_summary = ", ".join(params[:3]) + (f" …" if len(params) > 3 else "")
                  legend_items.append(
                      f'<li><a href="{esc_anchor}">'
                      f'<span class="legend-num">{human_idx}</span>'
                      f'<span class="legend-text"><strong>{esc_label}</strong>'
                      + (f'<span class="legend-params">{html.escape(param_summary)}</span>' if param_summary else '')
                      + f'</span></a></li>'
                  )
                  y += bh + gap

              schema_title = html.escape(data.get("title", "Aufbau des Berichts"))
              return (
                  '<section class="card report-schema">'
                  '<details open class="report-schema__panel">'
                  f'<summary>{schema_title} – Parameter im Bericht verorten</summary>'
                  '<p class="report-schema__hint">Klicke auf eine Region oder auf einen Eintrag in der Legende, '
                  'um zur passenden Parametergruppe in der Tabelle zu springen.</p>'
                  '<div class="report-schema__layout">'
                  f'<div class="report-schema__stage">'
                  f'<svg viewBox="0 0 {vw} {vh}" preserveAspectRatio="xMidYMid meet" '
                  f'class="report-schema__svg" role="img" aria-label="{schema_title}">'
                  f'{"".join(hotspots)}'
                  f'</svg>'
                  f'</div>'
                  '<ol class="report-schema__legend">'
                  f'{"".join(legend_items)}'
                  '</ol>'
                  '</div>'
                  '</details>'
                  '</section>'
              )

          def render_info_page(artifact_name, readme_path, schema_html):
              try:
                  text = Path(readme_path).read_text(encoding="utf-8")
              except OSError:
                  return None
              body = md.markdown(
                  text,
                  extensions=["extra", "sane_lists", "toc", "fenced_code", "tables", "codehilite", "attr_list"],
                  output_format="html5",
              )
              title = TITLE_MAP.get(artifact_name, artifact_name)
              return INFO_TEMPLATE.format(
                  title=html.escape(title),
                  artifact=html.escape(artifact_name),
                  schema=schema_html,
                  body=body,
              )

          def extract_description(readme_path):
              """Return the first text paragraph from a README, stripped of Markdown."""
              try:
                  lines = Path(readme_path).read_text(encoding="utf-8").splitlines()
              except OSError:
                  return ""
              # skip H1 title and leading blank lines
              i = 0
              while i < len(lines) and (lines[i].startswith("#") or not lines[i].strip()):
                  i += 1
              # collect paragraph lines until blank line, next heading, ---, or table
              para = []
              while i < len(lines):
                  line = lines[i].strip()
                  if not line or line.startswith("#") or line.startswith("---") or line.startswith("|"):
                      break
                  para.append(line)
                  i += 1
              text = " ".join(para)
              # strip markdown bold/italic and inline code
              text = re.sub(r"\*\*(.+?)\*\*", r"\1", text)
              text = re.sub(r"\*(.+?)\*",     r"\1", text)
              text = re.sub(r"`(.+?)`",        r"\1", text)
              # strip leading emoji/non-word characters
              text = re.sub(r"^[^\w\s]+\s*",  "",    text)
              return text.strip()

          last_modified = {}
          lm_path = Path("artifacts/last-modified.tsv")
          if lm_path.exists():
              for line in lm_path.read_text().splitlines():
                  parts = line.split("\t")
                  if len(parts) == 2:
                      last_modified[parts[0]] = parts[1]

          metadata_path = Path("site/downloads/metadata.tsv")
          info_dir = Path("site/downloads/info")
          info_dir.mkdir(parents=True, exist_ok=True)
          artifacts = []
          if metadata_path.exists():
              for line in metadata_path.read_text().splitlines():
                  name, filename, size_bytes, sha256 = line.split("\t")
                  readme_path = README_MAP.get(name, "")
                  description = extract_description(readme_path)
                  info_url = None
                  schema_html = render_schema(name, SCHEMA_MAP.get(name, ""))
                  if readme_path and Path(readme_path).exists():
                      page = render_info_page(name, readme_path, schema_html)
                      if page:
                          info_file = info_dir / f"{name}.html"
                          info_file.write_text(page, encoding="utf-8")
                          info_url = f"info/{name}.html"
                  artifacts.append(
                      {
                          "name": name,
                          "filename": filename,
                          "sizeBytes": int(size_bytes),
                          "sha256": sha256,
                          "url": f"files/{filename}",
                          "infoUrl": info_url,
                          "description": description,
                          "lastModified": last_modified.get(name),
                      }
                  )

          payload = {
              "generatedAt": datetime.now(timezone.utc).isoformat(),
              "workflow": os.environ.get("WORKFLOW_NAME"),
              "runId": os.environ.get("RUN_ID"),
              "runNumber": os.environ.get("RUN_NUMBER"),
              "commitSha": os.environ.get("COMMIT_SHA"),
              "artifacts": artifacts,
          }

          output_path = Path("site/downloads/latest.json")
          output_path.write_text(json.dumps(payload, indent=2))
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
